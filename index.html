<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — To-Do List App</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>" />
  <style>
    /* ─── RESET & ROOT VARIABLES ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #dbe9fb;
      --bg2: #c3d9f6;
      --surface: rgba(255,255,255,0.92);
      --surface2: #eaf2ff;
      --border: #b8d4f5;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --success-hover: #15803d;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --text: #1e293b;
      --text-muted: #64748b;
      --done-text: #94a3b8;
      --shadow: 0 8px 32px rgba(37,99,235,0.13);
      --radius: 14px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --transition: 0.25s cubic-bezier(.4,0,.2,1);
    }

    body.dark {
      --bg: #0f172a;
      --bg2: #1e293b;
      --surface: rgba(30,41,59,0.97);
      --surface2: #1e3a5f;
      --border: #334155;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #22c55e;
      --success-hover: #16a34a;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --done-text: #475569;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* ─── BODY & LAYOUT ─── */
    body {
      font-family: var(--font);
      background: linear-gradient(145deg, var(--bg) 0%, var(--bg2) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
      color: var(--text);
      transition: background var(--transition), color var(--transition);
    }

    /* ─── HEADER ─── */
    header {
      width: 100%;
      max-width: 560px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--primary);
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 20px;
      box-shadow: 0 4px 12px rgba(37,99,235,0.35);
      transition: background var(--transition);
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo span {
      color: var(--primary);
    }

    /* ─── DARK MODE TOGGLE ─── */
    .toggle-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      transition: all var(--transition);
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .toggle-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-1px);
    }

    .toggle-btn .icon { font-size: 16px; }

    /* ─── STATS BAR ─── */
    .stats-bar {
      width: 100%;
      max-width: 560px;
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      text-align: center;
      transition: all var(--transition);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .stat-number {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    /* ─── MAIN CARD ─── */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      transition: all var(--transition);
    }

    /* ─── INPUT ROW ─── */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .task-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: all var(--transition);
      font-family: var(--font);
    }

    .task-input::placeholder { color: var(--text-muted); }

    .task-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    .add-btn {
      padding: 12px 22px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(37,99,235,0.4);
    }

    .add-btn:active { transform: scale(0.97); }

    /* ─── FILTER TABS ─── */
    .filter-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      background: var(--surface2);
      padding: 5px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 7px 10px;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      transition: all var(--transition);
    }

    .tab.active {
      background: var(--surface);
      color: var(--primary);
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    /* ─── TASK LIST ─── */
    #task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 60px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      transition: all var(--transition);
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover {
      border-color: var(--primary);
      transform: translateX(2px);
      box-shadow: 0 3px 12px rgba(37,99,235,0.1);
    }

    .task-item.completed {
      opacity: 0.7;
      border-color: var(--success);
    }

    /* Custom Checkbox */
    .check-wrap {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .check-wrap input {
      display: none;
    }

    .checkmark {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 13px;
      color: transparent;
      transition: all var(--transition);
      background: var(--surface);
    }

    .check-wrap input:checked + .checkmark {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }

    /* Task Text */
    .task-text {
      flex: 1;
      font-size: 15px;
      color: var(--text);
      word-break: break-word;
      transition: all var(--transition);
      line-height: 1.4;
    }

    .task-text.done {
      text-decoration: line-through;
      color: var(--done-text);
    }

    /* Edit input */
    .edit-input {
      flex: 1;
      padding: 5px 10px;
      background: var(--surface);
      border: 1.5px solid var(--primary);
      border-radius: 6px;
      font-size: 15px;
      color: var(--text);
      font-family: var(--font);
      outline: none;
    }

    /* Task Buttons */
    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .task-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 15px;
      display: grid;
      place-items: center;
      transition: all var(--transition);
    }

    .edit-btn  { background: rgba(37,99,235,0.12); color: var(--primary); }
    .save-btn  { background: rgba(22,163,74,0.12); color: var(--success); display:none; }
    .delete-btn { background: rgba(220,38,38,0.12); color: var(--danger); }

    .task-btn:hover { transform: scale(1.13); filter: brightness(1.15); }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 36px 20px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon { font-size: 44px; margin-bottom: 10px; }
    .empty-state p { font-size: 15px; font-weight: 500; }
    .empty-state small { font-size: 13px; }

    /* ─── CLEAR COMPLETED ─── */
    .footer-bar {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .items-left {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .clear-btn {
      font-size: 13px;
      color: var(--danger);
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all var(--transition);
    }

    .clear-btn:hover { background: rgba(220,38,38,0.1); }

    /* ─── PRIORITY BADGE ─── */
    .priority {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      flex-shrink: 0;
    }
    .priority.high   { background: rgba(220,38,38,0.15); color: #dc2626; }
    .priority.medium { background: rgba(245,158,11,0.15); color: #d97706; }
    .priority.low    { background: rgba(22,163,74,0.15);  color: #16a34a; }

    /* ─── PRIORITY SELECT ─── */
    .priority-select {
      padding: 7px 10px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      outline: none;
      transition: border-color var(--transition);
    }

    .priority-select:focus { border-color: var(--primary); }

    /* ─── TOAST NOTIFICATION ─── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b;
      color: #f1f5f9;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      z-index: 9999;
      pointer-events: none;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 480px) {
      body { padding: 20px 10px 60px; }
      .logo h1 { font-size: 18px; }
      .add-btn { padding: 12px 14px; font-size: 14px; }
      .stat-number { font-size: 20px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">✅</div>
      <h1>Task<span>Flow</span></h1>
    </div>
    <button class="toggle-btn" id="themeToggle" onclick="toggleDark()">
      <span class="icon">🌙</span>
      <span id="themeLabel">Dark Mode</span>
    </button>
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-number" id="statTotal">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="statActive">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="statDone">0</div>
      <div class="stat-label">Done</div>
    </div>
  </div>

  <!-- MAIN CARD -->
  <div class="card">

    <!-- INPUT ROW -->
    <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:20px;">
      <div class="input-row">
        <input type="text" id="taskInput" class="task-input"
               placeholder="What needs to be done?" maxlength="120" />
        <button class="add-btn" onclick="addTask()">
          <span>+</span> Add
        </button>
      </div>
      <select id="prioritySelect" class="priority-select">
        <option value="medium">🟡 Medium Priority</option>
        <option value="high">🔴 High Priority</option>
        <option value="low">🟢 Low Priority</option>
      </select>
    </div>

    <!-- FILTER TABS -->
    <div class="filter-tabs">
      <button class="tab active" onclick="setFilter('all',this)">All</button>
      <button class="tab" onclick="setFilter('active',this)">Active</button>
      <button class="tab" onclick="setFilter('completed',this)">Completed</button>
    </div>

    <!-- TASK LIST -->
    <ul id="task-list"></ul>

    <!-- FOOTER -->
    <div class="footer-bar" id="footerBar" style="display:none;">
      <span class="items-left" id="itemsLeft"></span>
      <button class="clear-btn" onclick="clearCompleted()">Clear completed</button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

<script>
  /* ─── STATE ─── */
  let tasks = JSON.parse(localStorage.getItem('taskflow-tasks') || '[]');
  let filter = 'all';
  let darkMode = localStorage.getItem('taskflow-dark') === 'true';

  /* ─── INIT ─── */
  if (darkMode) {
    document.body.classList.add('dark');
    document.getElementById('themeLabel').textContent = 'Light Mode';
    document.querySelector('.toggle-btn .icon').textContent = '☀️';
  }
  render();

  /* ─── DARK MODE ─── */
  function toggleDark() {
    darkMode = !darkMode;
    document.body.classList.toggle('dark', darkMode);
    localStorage.setItem('taskflow-dark', darkMode);
    document.getElementById('themeLabel').textContent = darkMode ? 'Light Mode' : 'Dark Mode';
    document.querySelector('.toggle-btn .icon').textContent = darkMode ? '☀️' : '🌙';
  }

  /* ─── ADD TASK ─── */
  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) { showToast('⚠️ Please enter a task!'); return; }

    const priority = document.getElementById('prioritySelect').value;
    tasks.unshift({
      id: Date.now(),
      text,
      done: false,
      priority,
      createdAt: new Date().toLocaleString()
    });
    save();
    input.value = '';
    input.focus();
    showToast('✅ Task added!');
  }

  /* ─── TOGGLE DONE ─── */
  function toggleDone(id) {
    const task = tasks.find(t => t.id === id);
    if (task) { task.done = !task.done; save(); }
  }

  /* ─── DELETE ─── */
  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    showToast('🗑️ Task deleted!');
  }

  /* ─── EDIT ─── */
  function editTask(id) {
    const li = document.querySelector(`[data-id="${id}"]`);
    const textEl  = li.querySelector('.task-text');
    const editEl  = li.querySelector('.edit-input');
    const editBtn = li.querySelector('.edit-btn');
    const saveBtn = li.querySelector('.save-btn');

    const task = tasks.find(t => t.id === id);
    editEl.value = task.text;
    textEl.style.display = 'none';
    editEl.style.display = 'block';
    editBtn.style.display = 'none';
    saveBtn.style.display = 'grid';
    editEl.focus();
  }

  function saveTask(id) {
    const li = document.querySelector(`[data-id="${id}"]`);
    const editEl  = li.querySelector('.edit-input');
    const textEl  = li.querySelector('.task-text');
    const editBtn = li.querySelector('.edit-btn');
    const saveBtn = li.querySelector('.save-btn');

    const newText = editEl.value.trim();
    if (!newText) { showToast('⚠️ Task cannot be empty!'); return; }

    const task = tasks.find(t => t.id === id);
    task.text = newText;
    textEl.textContent = newText;
    textEl.style.display = 'block';
    editEl.style.display = 'none';
    editBtn.style.display = 'grid';
    saveBtn.style.display = 'none';
    save();
    showToast('✏️ Task updated!');
  }

  /* ─── FILTER ─── */
  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  /* ─── CLEAR COMPLETED ─── */
  function clearCompleted() {
    tasks = tasks.filter(t => !t.done);
    save();
    showToast('🧹 Cleared completed tasks!');
  }

  /* ─── SAVE & RENDER ─── */
  function save() {
    localStorage.setItem('taskflow-tasks', JSON.stringify(tasks));
    render();
  }

  function render() {
    const list = document.getElementById('task-list');
    const footer = document.getElementById('footerBar');

    const filtered = tasks.filter(t => {
      if (filter === 'active')    return !t.done;
      if (filter === 'completed') return t.done;
      return true;
    });

    // Stats
    const total  = tasks.length;
    const done   = tasks.filter(t => t.done).length;
    const active = total - done;
    document.getElementById('statTotal').textContent  = total;
    document.getElementById('statActive').textContent = active;
    document.getElementById('statDone').textContent   = done;

    // Footer
    if (total > 0) {
      footer.style.display = 'flex';
      document.getElementById('itemsLeft').textContent =
        `${active} item${active !== 1 ? 's' : ''} left`;
    } else {
      footer.style.display = 'none';
    }

    // Empty state
    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">${total === 0 ? '📝' : '🎉'}</div>
          <p>${total === 0 ? 'No tasks yet' : 'No tasks here!'}</p>
          <small>${total === 0 ? 'Add your first task above' : filter === 'completed' ? 'Complete some tasks first' : 'All tasks completed!'}</small>
        </div>`;
      return;
    }

    const priorityEmoji = { high: '🔴', medium: '🟡', low: '🟢' };

    list.innerHTML = filtered.map(task => `
      <li class="task-item ${task.done ? 'completed' : ''}" data-id="${task.id}">
        <label class="check-wrap">
          <input type="checkbox" ${task.done ? 'checked' : ''}
                 onchange="toggleDone(${task.id})" />
          <div class="checkmark">${task.done ? '✓' : ''}</div>
        </label>

        <span class="task-text ${task.done ? 'done' : ''}">${escHtml(task.text)}</span>
        <input type="text" class="edit-input" style="display:none"
               onkeyup="if(event.key==='Enter') saveTask(${task.id})" />

        <span class="priority ${task.priority}">${priorityEmoji[task.priority]} ${task.priority}</span>

        <div class="task-actions">
          <button class="task-btn edit-btn" onclick="editTask(${task.id})" title="Edit">✏️</button>
          <button class="task-btn save-btn" onclick="saveTask(${task.id})" title="Save">💾</button>
          <button class="task-btn delete-btn" onclick="deleteTask(${task.id})" title="Delete">🗑️</button>
        </div>
      </li>
    `).join('');
  }

  /* ─── UTILS ─── */
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  /* ─── KEYBOARD SHORTCUT ─── */
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });
</script>
</body>
</html>
